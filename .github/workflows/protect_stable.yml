name: Protect Stable Branch

on:
  push:
    branches:
      - stable

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Reject direct pushes
        run: |
          PARENTS=$(git show -s --format=%p HEAD | wc -w)
          MSG=$(git log -1 --pretty=%B)
          echo "Parent commits: $PARENTS"
          echo "Commit message: $MSG"
          if [ "$PARENTS" -lt 2 ] && ! echo "$MSG" | grep -qE "^chore: (bump|sync)"; then
            echo "ERROR: Direct pushes to 'stable' are not allowed."
            echo "Use './vortex-cli -R' from main to release a new version."
            exit 1
          fi
          echo "Push validated."
