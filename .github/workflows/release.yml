name: PROS Release

on:
  release:
    types: [published]

jobs:
  build-template:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi build-essential
          
      - name: Install PROS CLI
        run: pip install pros-cli
        
      - name: Build Library Template
        run: |
          pros make template
          
      - name: Package Full Example Project
        run: ./scripts/package_example_project.sh "/tmp/vortex-example-project" "Vortex-Example-Project.zip" "$GITHUB_WORKSPACE"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            vortex@*.zip
            Vortex-Example-Project.zip
          
      - name: Update Depot Branch
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin depot
          cp scripts/update_depot.py /tmp/update_depot.py
          git checkout depot
          python3 /tmp/update_depot.py "${{ github.ref_name }}"
          git add stable.json
          git commit -m "chore: update depot for release ${{ github.ref_name }}"
          git push origin depot
