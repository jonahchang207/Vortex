name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag to release'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PROS CLI
        run: |
          python3 -m pip install pros-cli

      - name: Install ARM GCC
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '10.3-2021.10' # Recommended version for PROS

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.tag_name }}" | sed 's/v//' >> $GITHUB_OUTPUT
            echo "TAG=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Stamp template.pros version
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.VERSION }}\"/" template.pros

      - name: Fetch and Apply PROS Kernel
        run: |
          # This ensures common.mk and other dependencies are present
          # We use the version specified in project.pros or a safe default
          pros c fetch kernel@4.2.2
          pros c apply kernel@4.2.2

      - name: Build Library
        run: |
          make library

      - name: Package Vortex.zip
        run: |
          # Ensure Vortex.a exists before zipping
          if [ ! -f "bin/Vortex.a" ]; then
            echo "ERROR: bin/Vortex.a not found!"
            ls -R bin/
            exit 1
          fi
          zip -r Vortex.zip include/Vortex bin/Vortex.a template.pros LICENSE README.md

      - name: Build release notes
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > body.md << EOF
          ## Installation

          **Quick install:**
          \`\`\`bash
          pros c fetch https://github.com/${{ github.repository }}/releases/download/${TAG}/Vortex.zip
          pros c install Vortex@${VERSION}
          \`\`\`

          **Or download \`Vortex.zip\` below and run:**
          \`\`\`bash
          pros c fetch Vortex.zip
          pros c install Vortex
          \`\`\`

          **Upgrading from an older version:**
          \`\`\`bash
          pros c upgrade Vortex
          \`\`\`

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what changed.
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: Vortex.zip
          body_path: body.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
