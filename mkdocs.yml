site_name: Vortex Odometry Library
site_description: A modular odometry and motion control library for VEX Robotics V5 using PROS.
site_author: Jonah Chang
repo_url: https://github.com/jonahchang207/Vortex
repo_name: jonahchang207/Vortex
edit_uri: edit/stable/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Setup Guide: setup.md
  - Configuration: configuration.md
  - Tuning Parameters: parameters.md
  - Guides:
      - PID Tuning: guides/tuner.md
  - API Reference:
      - Overview: api.md
      - Chassis: api/chassis.md
      - Odometry: api/odom.md
      - Tracking Wheels: api/tracking_wheels.md
      - PID & Exit Conditions: api/pid.md
      - Utility: api/util.md
      - Auton Selector: api/auton_selector.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - tables
