site_name: Vortex Odometry Motion Template
site_description: A customizable, powerful odometry and motion control template for VEX V5 PROS.
site_author: Jonah Chang

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Tutorials:
      - Driver Control: tutorials/driver-control.md
      - Odometry Setup: tutorials/odometry-setup.md
      - PID Tuning & Telemetry: tutorials/pid-tuning.md
      - Motion Algorithms: tutorials/motion-algorithms.md
  - API Reference:
      - Chassis: api/chassis.md
      - Odometry: api/odom.md
      - PID & Profiles: api/pid-profile.md
      - Utilities: api/utils.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jonahchang207/Vortex
